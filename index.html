<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WnetStudio - Blue Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f2f2f7;
            --panel: rgba(255, 255, 255, 0.75);
            --accent: #007aff; 
            --border: rgba(0, 122, 255, 0.15);
            --text-primary: #1d1d1f;
            --text-secondary: #48484a;
        }

        body { 
            background: var(--bg);
            color: var(--text-primary); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .apple-glass {
            background: var(--panel);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 122, 255, 0.05);
        }

        button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important; }
        button:hover { transform: translateY(-1px); filter: brightness(1.1); }
        button:active { transform: translateY(0px) scale(0.96); }

        .editor-full { position: fixed !important; inset: 64px 0 0 0 !important; width: 100% !important; z-index: 100 !important; background: white !important; }
        .preview-full { position: fixed !important; inset: 64px 0 0 0 !important; width: 100% !important; z-index: 100 !important; background: var(--bg) !important; padding: 20px; }

        /* AREA DE PREVIEW */
        #preview-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        #preview-container {
            position: relative;
            background: #ffffff;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.2);
        }

        /* MOLDURAS TIPO APPLE */
        .device-desktop { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important; 
            border-radius: 12px !important; 
            outline: none !important;
        }

        .device-tablet { 
            width: 820px; 
            height: 92%; 
            border: 16px solid #1a1a1a !important; 
            border-radius: 48px !important; 
            outline: 2px solid #3a3a3a;
        }

        .device-mobile { 
            width: 390px; 
            height: 85%; 
            border: 14px solid #1a1a1a !important; 
            border-radius: 58px !important; 
            outline: 2px solid #3a3a3a;
        }

        /* Dynamic Island */
        .device-mobile::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 30px;
            background: #1a1a1a;
            border-radius: 20px;
            z-index: 99;
        }

        .tab-btn { position: relative; font-size: 13px; font-weight: 500; color: var(--text-secondary); }
        .tab-btn.active { color: var(--accent); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--accent); border-radius: 2px; }

        .btn-apple { background: #ffffff; border: 1px solid var(--border); border-radius: 8px; color: var(--accent); font-weight: 500; }
        .btn-primary-apple { background: var(--accent); color: white; border-radius: 8px; }

        #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: #fff; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 320px; text-align: center; }
        .auth-input { width: 100%; background: #f5f5f7; border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; margin: 24px 0; outline: none; }
        
        #preview { flex: 1; width: 100%; height: 100%; border: none; background: white; border-radius: inherit; }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="w-20 h-20 bg-[#007aff] rounded-[22%] mx-auto mb-8 flex items-center justify-center shadow-lg">
                <svg width="40" height="40" viewBox="0 0 256 256" fill="white"><path d="M208,80H176V56a48,48,0,0,0-96,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80ZM96,56a32,32,0,0,1,64,0V80H96ZM208,208H48V96H208V208Z"></path></svg>
            </div>
            <h2 class="text-black font-semibold text-2xl tracking-tight">Wnet Studio</h2>
            <input type="password" id="passInput" class="auth-input" placeholder="Senha de Acesso">
            <button onclick="validateAuth()" class="w-full py-3 btn-primary-apple font-medium">Entrar</button>
        </div>
    </div>

    <header class="h-16 flex items-center justify-between px-8 border-b border-blue-50 z-50 apple-glass">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2 group cursor-pointer">
                <div class="h-7 w-7 bg-[#007aff] rounded-lg flex items-center justify-center shadow-sm">
                    <div class="h-2 w-2 bg-white rounded-full"></div>
                </div>
                <h1 class="text-sm font-semibold tracking-tight text-black">WNET<span class="text-[#007aff] font-bold">Studio</span></h1>
            </div>
            <nav class="flex gap-8 items-center pt-1">
                <button onclick="switchTab('html')" id="tab-html" class="tab-btn active uppercase tracking-wider">HTML</button>
                <button onclick="switchTab('css')" id="tab-css" class="tab-btn uppercase tracking-wider">CSS</button>
                <button onclick="switchTab('javascript')" id="tab-js" class="tab-btn uppercase tracking-wider">JS</button>
            </nav>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="importFile()" class="text-xs font-medium px-4 py-2 btn-apple">Importar</button>
            <button onclick="selectAllCode()" class="text-xs font-medium px-4 py-2 btn-apple">Selecionar Tudo</button>
            <button onclick="toggleFS('editor')" class="text-xs font-bold px-3 py-2 btn-apple">Aumentar Editor</button>
            <button onclick="toggleFS('preview')" class="text-xs font-bold px-3 py-2 btn-apple">Aumentar Projeto</button>
            <button onclick="downloadBundle()" class="text-xs font-semibold px-5 py-2 btn-primary-apple shadow-md">Exportar Projeto</button>
            <input type="file" id="fileInput" class="hidden" accept=".html" onchange="handleImport(event)">
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-5 gap-5">
        <section id="sec-editor" class="w-[40%] apple-glass rounded-2xl flex flex-col p-2 overflow-hidden border border-blue-100">
            <div id="editor-container" class="flex-1 w-full"></div>
        </section>

        <section id="sec-preview" class="flex-1 flex flex-col gap-4">
            <div class="flex items-center justify-between px-2">
                <div class="flex gap-6 bg-white/80 backdrop-blur-md px-5 py-2 rounded-xl border border-blue-50 shadow-sm">
                   <button onclick="setPreview('desktop')" class="text-2xl hover:scale-110">💻</button>
                   <button onclick="setPreview('tablet')" class="text-2xl hover:scale-110">📟</button>
                   <button onclick="setPreview('mobile')" class="text-2xl hover:scale-110">📱</button>
                </div>
            </div>
            <div id="preview-wrapper">
                <div id="preview-container" class="device-desktop">
                    <iframe id="preview"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
        function validateAuth() {
            const input = document.getElementById('passInput');
            if(["174510203040508", "NOVASENHA01"].includes(input.value)) {
                document.getElementById('auth-overlay').remove();
            } else { input.value = ""; }
        }
        document.getElementById('passInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') validateAuth(); });

        let editor, currentLang = 'html';
        let files = {
            html: localStorage.getItem('wnet-html') || '<div style="padding:40px; text-align:center;"><h1>Wnet Studio Blue</h1><p>Visualização Desktop Ativa.</p></div>',
            css: localStorage.getItem('wnet-css') || 'body { font-family: sans-serif; }',
            javascript: localStorage.getItem('wnet-js') || ''
        };

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: files[currentLang],
                language: 'html',
                theme: 'vs',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: false }
            });
            editor.onDidChangeModelContent(() => { 
                files[currentLang] = editor.getValue(); 
                updatePreview(); 
            });
            updatePreview();
        });

        function switchTab(lang) {
            currentLang = lang;
            monaco.editor.setModelLanguage(editor.getModel(), lang === 'javascript' ? 'javascript' : lang);
            editor.setValue(files[lang]);
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `tab-${lang === 'javascript' ? 'js' : lang}`));
        }

        function updatePreview() {
            const source = `<!DOCTYPE html><html><head><style>${files.css}</style></head><body>${files.html}<script>${files.javascript}<\/script></body></html>`;
            document.getElementById('preview').srcdoc = source;
        }

        function setPreview(type) {
            const container = document.getElementById('preview-container');
            container.className = ''; 
            setTimeout(() => {
                if(type === 'mobile') container.classList.add('device-mobile');
                else if(type === 'tablet') container.classList.add('device-tablet');
                else container.classList.add('device-desktop');
            }, 10);
        }

        function toggleFS(type) {
            const el = document.getElementById(type === 'editor' ? 'sec-editor' : 'sec-preview');
            const isFull = el.classList.contains(type === 'editor' ? 'editor-full' : 'preview-full');
            document.querySelectorAll('.editor-full, .preview-full').forEach(e => e.classList.remove('editor-full', 'preview-full'));
            if (!isFull) {
                el.classList.add(type === 'editor' ? 'editor-full' : 'preview-full');
                if(type === 'preview') setPreview('desktop');
            }
            editor.layout();
        }

        function importFile() { document.getElementById('fileInput').click(); }
        function handleImport(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const doc = new DOMParser().parseFromString(e.target.result, 'text/html');
                files.html = doc.body.innerHTML;
                editor.setValue(files[currentLang]); updatePreview();
            };
            reader.readAsText(event.target.files[0]);
        }
        function selectAllCode() { editor.focus(); editor.setSelection(editor.getModel().getFullModelRange()); }
        function downloadBundle() {
            const content = `<!DOCTYPE html><html><head><style>${files.css}</style></head><body>${files.html}<script>${files.javascript}<\/script></body></html>`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], {type: 'text/html'})); a.download = 'projeto_wnet.html'; a.click();
        }
    </script>
</body>
</html>
