<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WnetStudio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f5f5f7;
            --panel: rgba(255, 255, 255, 0.7);
            --accent: #007aff;
            --border: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
        }

        body { 
            background: var(--bg);
            color: var(--text-primary); 
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .apple-glass {
            background: var(--panel);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        /* Classes para Fullscreen */
        .editor-full { position: fixed !important; inset: 64px 0 0 0 !important; width: 100% !important; z-index: 40 !important; }
        .preview-full { position: fixed !important; inset: 64px 0 0 0 !important; width: 100% !important; z-index: 40 !important; background: #e5e5e5 !important; }

        .main-container { display: flex; height: calc(100vh - 64px); padding: 20px; gap: 20px; }
        .editor-section { width: 45%; display: flex; flex-direction: column; overflow: hidden; }
        .preview-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        #preview-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #preview-container { background: white; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        #monaco-editor { flex: 1; width: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Estilo Dispositivos */
        .mode-mobile { width: 375px; height: 667px; border: 12px solid #000; border-radius: 40px; }
        .mode-tablet { width: 768px; height: 1024px; border: 12px solid #000; border-radius: 30px; }
        .mode-desktop { width: 100%; height: 100%; border-radius: 16px; border: 1px solid var(--border); }

        /* Tela de Login Apple Style Original */
        #auth-overlay {
            position: fixed; inset: 0; z-index: 9999; background: #fff;
            display: flex; align-items: center; justify-content: center; transition: all 0.5s ease;
        }
        .auth-card { width: 320px; text-align: center; }
        .auth-input {
            width: 100%; background: #f5f5f7; border: 1px solid #d2d2d7; border-radius: 12px;
            padding: 12px; color: #000; text-align: center; font-size: 1rem; margin: 24px 0; outline: none;
        }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .btn-primary-apple { background: var(--accent); color: white; border-radius: 8px; transition: opacity 0.2s; }
        .tab-btn.active { color: var(--text-primary); border-bottom: 2px solid var(--text-primary); }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="w-20 h-20 bg-black rounded-[22%] mx-auto mb-8 flex items-center justify-center shadow-xl">
                <svg width="40" height="40" viewBox="0 0 256 256" fill="white"><path d="M208,80H176V56a48,48,0,0,0-96,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80ZM96,56a32,32,0,0,1,64,0V80H96ZM208,208H48V96H208V208Z"></path></svg>
            </div>
            <h2 class="text-black font-semibold text-2xl tracking-tight">Iniciar Sessão</h2>
            <p class="text-gray-500 text-sm mt-1">Digite a senha de Acesso</p>
            <input type="password" id="passInput" class="auth-input" placeholder="Senha" maxlength="20">
            <button onclick="validateAuth()" class="w-full py-3 btn-primary-apple font-medium">Entrar</button>
            <p id="error-msg" class="text-red-500 text-xs mt-4 opacity-0">Senha incorreta.</p>
        </div>
    </div>

    <header class="h-16 flex items-center justify-between px-8 apple-glass z-50">
        <div class="flex items-center gap-8">
            <h1 class="text-sm font-semibold tracking-tight">WNET<span class="opacity-50">Studio</span></h1>
            <nav class="flex gap-6">
                <button onclick="switchTab('html')" id="tab-html" class="tab-btn active text-xs font-medium uppercase tracking-wider">HTML</button>
                <button onclick="switchTab('css')" id="tab-css" class="tab-btn text-xs font-medium uppercase tracking-wider text-gray-400">CSS</button>
                <button onclick="switchTab('javascript')" id="tab-js" class="tab-btn text-xs font-medium uppercase tracking-wider text-gray-400">JS</button>
            </nav>
        </div>

        <div class="flex items-center gap-2">
            <div class="flex bg-black/5 p-1 rounded-xl mr-2">
                <button onclick="setPreview('mobile')" class="px-3 py-1 hover:bg-white rounded-lg transition-all" title="Celular">📱</button>
                <button onclick="setPreview('tablet')" class="px-3 py-1 hover:bg-white rounded-lg transition-all" title="Tablet">📟</button>
                <button onclick="setPreview('desktop')" class="px-3 py-1 hover:bg-white rounded-lg transition-all" title="Desktop">💻</button>
            </div>
            
            <button onclick="selectAllCode()" class="text-[11px] font-medium px-3 py-1.5 bg-white border border-gray-200 rounded-lg">Selecionar Tudo</button>
            <button onclick="clearAll()" class="text-[11px] font-medium px-3 py-1.5 text-red-500">Limpar Tudo</button>
            
            <button onclick="toggleFS('editor')" class="text-[11px] font-bold px-3 py-1.5 bg-black/5 rounded-lg">Aumentar Editor</button>
            <button onclick="toggleFS('preview')" class="text-[11px] font-bold px-3 py-1.5 bg-black/5 rounded-lg">Aumentar Projeto</button>
            
            <button onclick="downloadBundle()" class="ml-2 text-[11px] font-semibold px-4 py-2 btn-primary-apple shadow-lg">Exportar HTML</button>
        </div>
    </header>

    <main class="main-container">
        <section id="sec-editor" class="editor-section apple-glass rounded-2xl p-2 border border-gray-200">
            <div id="monaco-editor"></div>
        </section>

        <section id="sec-preview" class="preview-section">
            <div id="preview-wrapper">
                <div id="preview-container" class="mode-desktop">
                    <iframe id="preview"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Lógica de Autenticação Original Restaurada
        function validateAuth() {
            const input = document.getElementById('passInput');
            const overlay = document.getElementById('auth-overlay');
            const error = document.getElementById('error-msg');
            if(["174510203040508", "NOVASENHA01"].includes(input.value)) {
                overlay.style.opacity = '0';
                overlay.style.transform = 'translateY(-100%)';
                setTimeout(() => overlay.remove(), 600);
            } else {
                input.classList.add('shake');
                error.style.opacity = '1';
                setTimeout(() => { input.classList.remove('shake'); error.style.opacity = '0'; input.value = ""; }, 1000);
            }
        }

        let editor, currentLang = 'html';
        let files = {
            html: localStorage.getItem('wnet-html') || '<h1>Bem-vindo ao WnetStudio</h1>',
            css: localStorage.getItem('wnet-css') || 'body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }',
            javascript: localStorage.getItem('wnet-js') || 'console.log("Iniciado");'
        };

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: files[currentLang],
                language: 'html',
                theme: 'vs',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14
            });
            editor.onDidChangeModelContent(() => { 
                files[currentLang] = editor.getValue(); 
                localStorage.setItem('wnet-' + currentLang, files[currentLang]);
                updatePreview(); 
            });
            updatePreview();
        });

        function updatePreview() {
            const frame = document.getElementById('preview');
            const source = `<!DOCTYPE html><html><head><style>${files.css}</style></head><body>${files.html}<script>${files.javascript}<\/script></body></html>`;
            frame.srcdoc = source;
        }

        function switchTab(lang) {
            currentLang = lang;
            monaco.editor.setModelLanguage(editor.getModel(), lang === 'javascript' ? 'javascript' : lang);
            editor.setValue(files[lang]);
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.id === `tab-${lang === 'javascript' ? 'js' : lang}`);
                b.classList.toggle('text-gray-400', b.id !== `tab-${lang === 'javascript' ? 'js' : lang}`);
            });
        }

        function setPreview(type) {
            const container = document.getElementById('preview-container');
            container.className = `mode-${type}`;
        }

        function toggleFS(type) {
            const el = document.getElementById(type === 'editor' ? 'sec-editor' : 'sec-preview');
            const isFull = el.classList.contains(type === 'editor' ? 'editor-full' : 'preview-full');
            document.getElementById('sec-editor').classList.remove('editor-full');
            document.getElementById('sec-preview').classList.remove('preview-full');
            if (!isFull) el.classList.add(type === 'editor' ? 'editor-full' : 'preview-full');
            editor.layout();
        }

        function selectAllCode() { editor.focus(); editor.setSelection(editor.getModel().getFullModelRange()); }
        function clearAll() { if(confirm("Limpar tudo?")) { files.html = ""; files.css = ""; files.javascript = ""; editor.setValue(""); updatePreview(); } }
        function downloadBundle() {
            const content = `<!DOCTYPE html><html><head><style>${files.css}</style></head><body>${files.html}<script>${files.javascript}<\/script></body></html>`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], {type: 'text/html'})); a.download = 'projeto.html'; a.click();
        }
    </script>
</body>
</html>
